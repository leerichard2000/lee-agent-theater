version: 2

updates:
  # Root (monorepo) — devDependencies compartilhadas
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - root
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # apps/server — Fastify, plugins, adapters
  - package-ecosystem: npm
    directory: "/apps/server"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - server
    commit-message:
      prefix: "chore(deps/server)"
      include: scope

  # apps/web — React, Vite, Phaser, Tailwind
  - package-ecosystem: npm
    directory: "/apps/web"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - web
    commit-message:
      prefix: "chore(deps/web)"
      include: scope

  # packages/core — tipos e contratos
  - package-ecosystem: npm
    directory: "/packages/core"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - core
    commit-message:
      prefix: "chore(deps/core)"
      include: scope

  # GitHub Actions — manter workflows atualizados
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps/actions)"
      include: scope
